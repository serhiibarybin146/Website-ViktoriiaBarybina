<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Viktoriia Barybina</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- ===== HEADER ===== -->
    <header class="site-header">
        <div class="header-inner container">
            <a href="index.html" class="logo" aria-label="Viktoriia Barybina Home">
                <div class="logo-text">
                    <span class="brand-name">Viktoriia</span>
                    <span class="brand-suffix">Barybina</span>
                </div>
            </a>
            <div class="header-actions">
                <button class="mobile-toggle" aria-label="Toggle menu" aria-controls="mainNav" aria-expanded="false">
                    <iconify-icon icon="solar:hamburger-menu-linear"></iconify-icon>
                </button>
            </div>
        </div>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main>
        <section class="hero">
            <div class="hero-grid container">
                <!-- Form Side -->
                <div class="hero-content" style="display:flex; align-items:center; justify-content:center;">
                    <div class="auth-container">
                        <h1 class="auth-title" style="margin-top:0;">Создать аккаунт</h1>
                        <form id="registerForm" class="auth-form" style="max-width:100%;">
                            <div class="form-group">
                                <label for="name" class="form-label">Ваше имя</label>
                                <input type="text" id="name" class="form-input" placeholder="Введите ваше имя" required>
                            </div>
                            <div class="form-group">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" id="email" class="form-input" placeholder="example@mail.com"
                                    required>
                            </div>
                            <div class="form-group">
                                <label for="password" class="form-label">Пароль</label>
                                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                            </div>
                            <button type="submit" class="btn-primary">Зарегистрироваться</button>
                        </form>
                        <p class="auth-switch">Уже есть аккаунт? <a href="login.html" class="auth-link">Войти</a></p>
                    </div>
                </div>

                <!-- Visual Side -->
                <div class="hero-visual">
                    <div class="image-wrapper">
                        <img src="assets/hero-image.webp" class="hero-img" alt="Viktoriia Barybina - Numerologist">
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="site-footer">
        <div class="footer-inner container">
            <span class="footer-brand">Numerolog Viktoriia Barybina</span>
            <div class="footer-socials">
                <a href="https://www.instagram.com/numerology_with_vika/" class="social-link" target="_blank"
                    rel="noopener noreferrer" aria-label="Instagram">
                    <iconify-icon icon="solar:camera-linear"></iconify-icon>
                </a>
                <a href="https://t.me/+Grjsp70ErgFhYWUy" class="social-link" target="_blank" rel="noopener noreferrer"
                    aria-label="Telegram">
                    <iconify-icon icon="solar:plain-linear"></iconify-icon>
                </a>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
</body>

</html>
