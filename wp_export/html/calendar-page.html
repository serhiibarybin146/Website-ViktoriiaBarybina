<!-- 
    PAGE: CALENDAR (Elementor HTML Widget Content)
    VERSION: 2.1 (FIXED)
-->
<div class="custom-page-wrapper calendar-bg">
    <!-- Header -->
    <header class="site-header">
        <div class="header-inner">
            <a href="/" class="logo"><span class="brand-name">Viktoriia</span><span
                    class="brand-suffix">Barybina</span></a>
        </div>
    </header>

    <main class="calendar-main container">

        <!-- Sticky Header (Weekdays) -->
        <header class="calendar-header">
            <div class="weekday">ПН</div>
            <div class="weekday">ВТ</div>
            <div class="weekday">СР</div>
            <div class="weekday">ЧТ</div>
            <div class="weekday">ПТ</div>
            <div class="weekday">СБ</div>
            <div class="weekday">ВС</div>
        </header>

        <div class="calendar-content-wrapper">

            <!-- GRID -->
            <div class="calendar-grid-container glass-card">
                <div class="calendar-grid" id="calendarGrid">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- FOOTER INFO BOXES -->
            <div class="calendar-footer-grid">
                <!-- Tip/Advice -->
                <div class="footer-box tip-box glass-card">
                    <h3>Совет месяца</h3>
                    <p>Проявляйте настойчивость в достижении целей, но избегайте агрессии. Хорошее время для спорта и
                        активных действий.</p>
                </div>

                <!-- Focus -->
                <div class="footer-box focus-box glass-card">
                    <h3>Фокус месяца</h3>
                    <div class="focus-tags">
                        <span class="focus-tag">Лидерство</span>
                        <span class="focus-tag">Активность</span>
                        <span class="focus-tag">Целеустремленность</span>
                        <span class="focus-tag">Спорт</span>
                        <span class="focus-tag">Движение</span>
                    </div>
                </div>
            </div>

        </div>
    </main>
</div>
